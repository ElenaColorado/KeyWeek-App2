<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Caja de Ahorros Biometrica</title>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@17/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.development.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Face API -->
    <script defer src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.min.js"></script>
    <style>
        body { -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; touch-action: manipulation; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const Speaker = ({ text, styleClass = "ml-2 text-xl inline-block cursor-pointer" }) => {
            const speak = (e) => {
                e.stopPropagation();
                e.preventDefault();
                const u = new SpeechSynthesisUtterance(text);
                u.lang = 'es-ES';
                window.speechSynthesis.cancel();
                window.speechSynthesis.speak(u);
            };
            return <span onClick={speak} className={`hover:scale-110 active:scale-95 transition-transform select-none ${styleClass}`} title="Escuchar texto" role="button">🔊</span>;
        };
        const AVATARES = ['🐶', '🐱', '🦊', '🐰', '🐯', '🐸', '🐼', '🦁', '🐮', '🐷', '🐵', '🐔', '🐧', '🐻', '🐨'];

        // COMPONENTE ESCÁNER FACIAL REUTILIZABLE
        const Scanner = ({ avatar, isRegistration, isEncargadoAuth, onSuccess, onCancel }) => {
            const videoRef = useRef();
            const [msg, setMsg] = useState('📸 Mirando...');
            const [isChecking, setIsChecking] = useState(false);

            useEffect(() => {
                let stream;
                navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
                    stream = s;
                    if (videoRef.current) videoRef.current.srcObject = stream;
                }).catch(err => setMsg('❌ Dale permiso a la cámara en el navegador'));
                
                return () => { if(stream) stream.getTracks().forEach(t => t.stop()); }
            }, []);

            const handleVideoPlay = async () => {
                try {
                    let savedDescriptor = null;

                    // Si NO es un registro nuevo, descargamos la cara guardada para compararla
                    if (!isRegistration) {
                        setMsg(`Validando Rostro de ${avatar}...`);
                        const res = await fetch(`/caras/${encodeURIComponent(avatar)}`);
                        if (res.ok) {
                            const data = await res.json();
                            savedDescriptor = new Float32Array(Object.values(data.descriptor));
                        } else {
                            setMsg('❌ Error: Cara no encontrada');
                            return;
                        }
                    } else {
                        setMsg(`Mapeando tu rostro para ${avatar}...`);
                    }

                    const checkInterval = setInterval(async () => {
                        if (!videoRef.current || isChecking) return;
                        setIsChecking(true);
                        
                        const detection = await faceapi.detectSingleFace(videoRef.current, new faceapi.SsdMobilenetv1Options())
                            .withFaceLandmarks().withFaceDescriptor();
                        
                        if (detection) {
                            if (savedDescriptor) {
                                // VERIFICAR ROSTRO EXISTENTE
                                const distance = faceapi.euclideanDistance(detection.descriptor, savedDescriptor);
                                if (distance < 0.45) {
                                    clearInterval(checkInterval);
                                    setMsg('✅ ¡Aprobado!');
                                    setTimeout(() => onSuccess(), 1000);
                                } else {
                                    setMsg('❌ Cara incorrecta.');
                                }
                            } else if (isRegistration) {
                                // REGISTRAR PRIMERA VEZ
                                clearInterval(checkInterval);
                                await fetch('/caras', {
                                    method: 'POST',
                                    headers: {'Content-Type': 'application/json'},
                                    body: JSON.stringify({ avatar, descriptor: Array.from(detection.descriptor) })
                                });
                                setMsg('✅ ¡Perfil Creado Exitosamente!');
                                setTimeout(() => onSuccess(), 1200);
                            }
                        }
                        setIsChecking(false);
                    }, 800);

                    return () => clearInterval(checkInterval);

                } catch (e) {
                    setMsg('❌ Error de red');
                }
            };

            // Titulo Dinámico
            let headerTitle = "Inicio de Sesión";
            if (isRegistration) headerTitle = "Creando Tu Perfil";
            if (isEncargadoAuth) headerTitle = "Certificación de Encargado";

            return (
                <div className="fixed inset-0 bg-black/95 z-50 flex flex-col items-center justify-center p-4">
                    <h3 className="text-blue-200 text-lg font-bold mb-2 tracking-widest uppercase">{headerTitle} <Speaker text={headerTitle} styleClass="ml-2" /></h3>
                    <div className="bg-blue-600 text-white text-2xl font-bold px-8 py-3 rounded-full shadow-2xl mb-6 flex items-center gap-3 max-w-sm text-center">
                        <span className="text-5xl">{isEncargadoAuth ? '💼' : avatar}</span>
                        <span>{msg}</span>
                    </div>
                    
                    <div className="relative rounded-[40px] overflow-hidden border-8 border-gray-600 shadow-[0_0_50px_rgba(37,99,235,0.3)] bg-gray-900 w-full max-w-sm aspect-[3/4]">
                        <video ref={videoRef} onPlay={handleVideoPlay} autoPlay muted playsInline className="absolute inset-0 w-full h-full object-cover scale-[1.2] origin-center" />
                        
                        {/* Guías visuales para colocar la cara */}
                        <div className="absolute inset-0 border-4 border-dashed border-white/40 m-8 rounded-[60px] pointer-events-none flex items-center justify-center">
                            <div className="w-full h-full animate-pulse bg-blue-500/10 rounded-[50px]"></div>
                        </div>
                    </div>
                    
                    <button onClick={onCancel} className="mt-8 bg-red-600 w-20 h-20 flex items-center justify-center rounded-full shadow-xl active:scale-95 border-4 border-red-800">
                        <span className="text-4xl drop-shadow-md">❌</span>
                    </button>
                </div>
            );
        };

        function App() {
            const [modelsLoaded, setModelsLoaded] = useState(false);
            
            // Navegacion Principal
            const [view, setView] = useState('menu'); // 'menu' | 'dashboard'
            
            // Estructura de Perfiles Dinamicos
            const [perfiles, setPerfiles] = useState([]);
            
            // Sesion Actual
            const [currentUser, setCurrentUser] = useState(null); 
            const [resumenData, setResumenData] = useState(null);
            
            // Estado del aporte en el dashboard
            const [monto, setMonto] = useState(0);
            
            // Scanner config = { targetAvatar: string, type: 'login' | 'register' | 'encargado-verify' }
            const [scannerConfig, setScannerConfig] = useState(null);
            const [showSuccess, setShowSuccess] = useState(false);
            const [globalData, setGlobalData] = useState(null);
            const [modoAporte, setModoAporte] = useState('aportar'); // 'aportar' | 'retirar'

            // Obtener todos los perfiles registrados desde el backend
            const fetchPerfiles = async () => {
                const res = await fetch('/perfiles');
                if (res.ok) {
                    const data = await res.json();
                    setPerfiles(data);
                }
            };

            const fetchGlobal = async () => {
                const res = await fetch('/resumen-global');
                if (res.ok) {
                    setGlobalData(await res.json());
                    setView('global');
                }
            };

            // Cargar Modelos IA y Perfiles
            useEffect(() => {
                const initApp = async () => {
                    try {
                        const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                        await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
                        await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
                        await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
                        setModelsLoaded(true);
                        fetchPerfiles();
                    } catch(e) {
                        alert("Error cargando IA de caras. Verifica tu internet.");
                    }
                };
                
                const checkFaceApi = setInterval(() => {
                    if (typeof faceapi !== 'undefined') {
                        clearInterval(checkFaceApi);
                        initApp();
                    }
                }, 100);
            }, []);

            const sumarDinero = (cantidad) => setMonto(prev => Math.round((prev + cantidad) * 100) / 100);

            // --- ACCIONES CLICK ---
            
            // Click -> ➕ En el menu
            const handleRegisterClick = () => {
                const usedAvatars = perfiles.map(p => p.avatar);
                const nextAvatar = AVATARES.find(a => !usedAvatars.includes(a));
                if (!nextAvatar) return alert("Se ha alcanzado el límite máximo de avatares.");
                
                setScannerConfig({ targetAvatar: nextAvatar, type: 'register' });
            };

            // Click -> Perfil Existente en menu
            const handleLoginClick = (avatar) => {
                setScannerConfig({ targetAvatar: avatar, type: 'login' });
            };

            // Click -> ✅ (Intentar guardar aporte en dashboard)
            const handleIntentarGuardar = () => {
                const encargado = perfiles.find(p => p.isEncargado);
                if (!encargado) return alert("Error crítico: No se encontró ningún encargado en la base de datos.");
                
                // Pedimos escanear la cara del Encargado Oficial
                setScannerConfig({ targetAvatar: encargado.avatar, type: 'encargado-verify' });
            };

            // --- CALLBACK CUANDO LA CÁMARA APRUEBA ---
            const handleScannerSuccess = async () => {
                const config = scannerConfig;
                setScannerConfig(null);

                // Si se estaba iniciando sesion o registrando
                if (config.type === 'register' || config.type === 'login') {
                    const res = await fetch(`/resumen/${encodeURIComponent(config.targetAvatar)}`);
                    if (res.ok) {
                        const data = await res.json();
                        setResumenData(data); // Math done by server
                        setCurrentUser(config.targetAvatar);
                        setMonto(0);
                        setView('dashboard');
                        fetchPerfiles(); // Recargar por si se creó el primer encargado
                    }
                } 
                // Si el encargado certificó el aporte de dinero
                else if (config.type === 'encargado-verify') {
                    const nuevoAporte = {
                        id: Date.now(),
                        participante: currentUser,
                        monto: modoAporte === 'retirar' ? -monto : monto
                    };
                    
                    await fetch('/aportes', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(nuevoAporte)
                    });
                    
                    setMonto(0);
                    setShowSuccess(true);
                    setTimeout(() => setShowSuccess(false), 2000);

                    // Refrescar automaticamente el resumen de la sesion actual
                    const res = await fetch(`/resumen/${encodeURIComponent(currentUser)}`);
                    if (res.ok) setResumenData(await res.json());
                }
            };

            // --- PANTALLAS ---

            if (!modelsLoaded) {
                return (
                    <div className="fixed inset-0 bg-blue-600 flex flex-col items-center justify-center text-white p-6 text-center z-50">
                        <div className="text-9xl mb-8 animate-bounce">🤖</div>
                        <h1 className="text-4xl font-black mb-4">Cargando Sistema Biométrico <Speaker text="Cargando Sistema Biométrico"/></h1>
                        <p className="text-blue-200 text-xl font-bold max-w-xs">Esto toma unos segundos la primera vez. <Speaker text="Esto toma unos segundos la primera vez."/></p>
                        <div className="mt-12 w-16 h-16 border-8 border-white border-t-transparent rounded-full animate-spin shadow-xl"></div>
                    </div>
                );
            }

            const renderMenu = () => {
                return (
                    <div className="flex flex-col items-center min-h-screen py-10 px-4">
                        <div className="bg-white px-8 py-4 rounded-full shadow-md mb-12 border-b-4 border-blue-500 relative flex items-center gap-4">
                            <h1 className="text-3xl font-black text-gray-800 tracking-wide">CAJA FUERTE <Speaker text="Caja Fuerte"/></h1>
                            <button onClick={fetchGlobal} className="text-3xl bg-blue-50 p-2 rounded-full hover:bg-blue-100 transition-colors shadow-sm active:scale-95 border-2 border-blue-200" title="Ver Caja Global">📊</button>
<Speaker text="Ver Caja Global" styleClass="ml-4 text-2xl inline-block cursor-pointer" />
                        </div>
                        
                        <div className="grid grid-cols-3 gap-6 max-w-md w-full">
                            {perfiles.map(p => (
                                <button 
                                    key={p.avatar} 
                                    onClick={() => handleLoginClick(p.avatar)}
                                    className="relative bg-white aspect-square rounded-[30px] flex items-center justify-center text-[70px] shadow-lg hover:shadow-xl active:scale-95 transition-all border-4 border-transparent hover:border-gray-200"
                                >
                                    <span className="drop-shadow-sm">{p.avatar}</span>
                                    {p.isEncargado && (
                                        <div className="absolute -top-3 -right-3 bg-blue-100 p-2 rounded-full shadow-sm border-2 border-white text-3xl" title="Encargado">💼</div>
                                    )}
                                </button>
                            ))}
                            
                            {/* Boton para Crear Nuevo Perfil */}
                            {perfiles.length < AVATARES.length && (
                                <button 
                                    onClick={handleRegisterClick}
                                    className="bg-blue-50 text-blue-600 aspect-square rounded-[30px] flex items-center justify-center text-6xl shadow-inner active:scale-95 transition-all border-4 border-dashed border-blue-300"
                                >
                                    ➕
                                </button>
                            )}
                        </div>
                        
                        {perfiles.length === 0 && (
                            <div className="mt-12 bg-blue-100 text-blue-800 p-6 rounded-3xl max-w-sm text-center font-bold shadow-sm">
                                <p className="text-5xl mb-4">👋</p>
                                <p>Toca el símbolo ➕ para crear el primer perfil. Al ser el primero, automáticamente serás el Encargado (💼). <Speaker text="Toca el símbolo más para crear el primer perfil. Al ser el primero, automáticamente serás el Encargado." /></p>
                            </div>
                        )}
                    </div>
                );
            };

            const renderDashboard = () => {
                const { aportesNetos, retirosNetos, deuda, interesGanado, balance, dineroDisponible, historial } = resumenData || { aportesNetos:0, retirosNetos:0, deuda:0, interesGanado:0, balance:0, dineroDisponible:0, historial:[] };
                const isReady = modoAporte === 'aportar' ? monto > 0 : (monto > 0 && monto <= dineroDisponible);

                // Encontrar quién es el encargado actualmente para mostrarlo en el boton de aprobacion
                const encargado = perfiles.find(p => p.isEncargado);

                return (
                    <div className="bg-white p-4 rounded-3xl shadow-xl max-w-md mx-auto relative border-t-8 border-green-500 mt-4 mb-10">
                        {/* Cabecera / Salir */}
                        <div className="flex justify-between items-center mb-6">
                            <button onClick={() => {setView('menu'); setCurrentUser(null);}} className="text-4xl bg-gray-100 w-16 h-16 rounded-full flex items-center justify-center shadow-sm active:scale-95">🚪</button>
                            <div className="relative">
                                <div className="text-7xl bg-green-50 p-3 rounded-full border-4 border-green-400 shadow-md">
                                    {currentUser}
                                </div>
                                {(encargado && encargado.avatar) === currentUser && <div className="absolute -bottom-2 -right-2 bg-blue-100 p-2 rounded-full shadow-sm border-2 border-white text-2xl">💼</div>}
                            </div>
                            <div className="w-16"></div>
                        </div>

                        {/* Tu Dinero */}
                        {/* Tu Dinero y Estado de Fondo Mutuo */}
                        <div className="space-y-3 animate-fade-in mb-8">
                            {/* Saldo Final Removido */}

                            <div className="grid grid-cols-2 gap-3">
                                {/* Aportes */}
                                <div className="bg-blue-50 p-4 rounded-3xl border-4 border-blue-200 flex flex-col items-center justify-center shadow-inner">
                                    <span className="text-[10px] font-bold text-blue-800 uppercase mb-1">Mis Aportes 📥 <Speaker text="Mis Aportes" styleClass="ml-1 inline-block cursor-pointer"/></span>
                                    <span className="text-2xl font-black text-blue-900">${aportesNetos.toFixed(2)}</span>
                                </div>
                                {/* Intereses Ganados */}
                                <div className="bg-green-50 p-4 rounded-3xl border-4 border-green-300 flex flex-col items-center justify-center relative overflow-hidden shadow-inner">
                                    <span className="text-[10px] font-bold text-green-800 uppercase mb-1">Interés Ganado 📈 <Speaker text="Interés Ganado" styleClass="ml-1 inline-block cursor-pointer"/></span>
                                    <span className="text-2xl font-black text-green-900">+${interesGanado.toFixed(2)}</span>
                                </div>
                            </div>
                            
                            {/* Deuda / Préstamos */}
                            {deuda > 0 && (
                                <div className="bg-red-50 p-4 rounded-3xl border-4 border-red-200 flex items-center justify-between shadow-inner">
                                    <span className="text-4xl">🧾</span>
                                    <div className="text-right text-red-700">
                                        <span className="text-[10px] uppercase font-bold block tracking-wider">Tu Deuda (Préstamo + 10%) <Speaker text="Tu deuda, préstamo más el diez porciento" styleClass="ml-1 inline-block cursor-pointer"/></span>
                                        <span className="text-3xl font-black">-${deuda.toFixed(2)}</span>
                                    </div>
                                </div>
                            )}
                        </div>

                        {/* CONDICIONAL: NO MOSTRAR APORTE SI ES EL ENCARGADO */}
                        {(encargado && encargado.avatar) === currentUser ? (
                            <div className="bg-blue-600 text-white p-8 rounded-3xl mb-8 text-center shadow-xl border-4 border-blue-800">
                                <span className="text-[90px] block mb-6 animate-pulse">💼</span>
                                <h3 className="font-black text-3xl mb-4">Eres el Encargado <Speaker text="Eres el Encargado"/></h3>
                                <p className="text-blue-100 font-medium text-xl leading-relaxed">Tu rol es autorizar y certificar con tu rostro cuando los demás participantes guarden su dinero. <Speaker text="Tu rol es autorizar y certificar con tu rostro cuando los demás participantes guarden su dinero."/></p>
                            </div>
                        ) : (
                            <div className={`p-5 rounded-3xl border-2 mb-8 shadow-inner ${modoAporte === 'aportar' ? 'bg-blue-50 border-blue-100' : 'bg-red-50 border-red-100'}`}>
                                
                                <div className="flex bg-white rounded-full p-2 mb-6 border-2 border-gray-200 shadow-sm relative">
                                    <button onClick={() => {setModoAporte('aportar'); setMonto(0);}} className={`flex-1 py-3 text-xl font-bold rounded-full transition-all z-10 ${modoAporte==='aportar' ? 'text-white shadow-md' : 'text-gray-400'}`}>Aportar <Speaker text="Aportar" styleClass="ml-1"/></button>
                                    <button onClick={() => {setModoAporte('retirar'); setMonto(0);}} className={`flex-1 py-3 text-xl font-bold rounded-full transition-all z-10 ${modoAporte==='retirar' ? 'text-white shadow-md' : 'text-gray-400'}`}>Retirar <Speaker text="Retirar" styleClass="ml-1"/></button>
                                    <div className={`absolute top-2 bottom-2 w-[calc(50%-8px)] rounded-full transition-all duration-300 ${modoAporte==='aportar' ? 'left-2 bg-green-500' : 'left-[calc(50%+4px)] bg-red-500'}`}></div>
                                </div>

                                <div className={`bg-white rounded-2xl p-4 mb-4 flex justify-between items-center border-4 ${modoAporte === 'aportar' ? 'border-green-200 text-green-700' : 'border-red-200 text-red-600'}`}>
                                    <button onClick={() => setMonto(0)} className="text-4xl bg-gray-100 p-3 rounded-full active:scale-95 shadow-sm">🗑️</button>
                                    <span className="text-5xl font-black">${monto.toFixed(2)}</span>
                                    <div className="w-10"></div>
                                </div>

                                <div className="grid grid-cols-2 gap-3 mb-6">
                                    {[1, 5, 10, 20].map(val => (
                                        <button key={val} onClick={() => sumarDinero(val)} className="bg-green-600 rounded-xl h-20 shadow-[0_6px_0_rgb(21,128,61)] active:translate-y-1 active:shadow-none border-2 border-green-800 flex justify-center items-center">
                                            <span className="text-4xl drop-shadow-sm">💵 {val}</span>
                                        </button>
                                    ))}
                                </div>
                                <div className="flex justify-around items-end h-24 mb-4">
                                    <button onClick={() => sumarDinero(0.25)} className="w-20 h-20 bg-gray-300 rounded-full border-4 border-gray-400 shadow-[0_6px_0_rgb(156,163,175)] active:translate-y-1"><span className="text-3xl font-bold text-gray-700">25</span></button>
                                    <button onClick={() => sumarDinero(0.10)} className="w-12 h-12 bg-gray-300 rounded-full border-4 border-gray-400 shadow-[0_4px_0_rgb(156,163,175)] active:translate-y-1 mb-4"><span className="text-sm font-bold text-gray-700">10</span></button>
                                    <button onClick={() => sumarDinero(0.05)} className="w-16 h-16 bg-gray-300 rounded-full border-4 border-gray-400 shadow-[0_4px_0_rgb(156,163,175)] active:translate-y-1 mb-2"><span className="text-lg font-bold text-gray-700">5</span></button>
                                    <button onClick={() => sumarDinero(0.01)} className="w-14 h-14 bg-orange-700 rounded-full border-4 border-orange-900 shadow-[0_4px_0_rgb(154,52,18)] active:translate-y-1 mb-3"><span className="text-sm font-bold text-orange-200">1</span></button>
                                </div>

                                {/* CERTIFICACION DEL ENCARGADO */}
                                <button 
                                    onClick={handleIntentarGuardar}
                                    disabled={!isReady}
                                    className={`w-full h-24 rounded-2xl flex items-center justify-between px-6 transition-all ${isReady ? (modoAporte === 'aportar' ? 'bg-blue-600 shadow-[0_8px_0_rgb(37,99,235)] text-white' : 'bg-red-600 shadow-[0_8px_0_rgb(220,38,38)] text-white') : 'bg-gray-200 grayscale opacity-50 text-gray-400'} active:translate-y-2 active:shadow-none`}
                                >
                                    <span className="text-4xl font-bold">{modoAporte === 'aportar' ? '✅' : '💸'}</span>
                                    <div className="flex flex-col items-center">
                                        <span className="text-sm font-bold uppercase opacity-80 mb-1">Certificar con: <Speaker text="Certificar con"/></span>
                                        <span className="text-3xl bg-white/20 rounded-full px-4 py-1">{(encargado && encargado.avatar)} 💼</span>
                                    </div>
                                </button>
                            </div>
                        )}
                        
                        {/* HISTORIAL PERSONAL REMOVIDO */}
                    </div>
                );
            };

            const renderGlobal = () => {
                if (!globalData) return null;
                const { globales, usuarios } = globalData;
                const { dineroDisponible, gananciaGlobal, totalAportesGlobal, totalPrestamosGlobal } = globales;

                return (
                    <div className="bg-white p-4 rounded-3xl shadow-xl max-w-md mx-auto relative border-t-8 border-purple-500 mt-4 mb-10 w-full animate-fade-in">
                        <div className="flex items-center justify-between mb-6">
                            <button onClick={() => setView('menu')} className="text-4xl bg-gray-100 w-16 h-16 rounded-full flex items-center justify-center shadow-sm active:scale-95">⬅️</button>
                            <h2 className="text-xl font-black text-purple-800 tracking-wide">FONDO MUTUO <Speaker text="Fondo Mutuo"/></h2>
                            <div className="w-16"></div>
                        </div>

                        {/* ESTADISTICAS DEL FONDO */}
                        <div className="grid grid-cols-2 gap-3 mb-8">
                            <div className="bg-purple-100 col-span-2 flex flex-col items-center justify-center p-6 text-center rounded-3xl border-4 border-purple-200 shadow-inner">
                                <p className="text-purple-600 font-bold uppercase tracking-widest mb-1 text-[10px]">Liquidez (Dinero Físico Real) <Speaker text="Liquidez, dinero físico real"/></p>
                                <span className="text-6xl font-black text-purple-900">${dineroDisponible.toFixed(2)}</span>
                            </div>
                            
                            <div className="bg-blue-50 p-4 text-center rounded-2xl border-2 border-blue-200 flex flex-col justify-center">
                                <span className="text-blue-500 text-[10px] font-bold uppercase mb-1">Aportes Base <Speaker text="Aportes Base"/></span>
                                <span className="text-blue-700 text-2xl font-black">${totalAportesGlobal.toFixed(2)}</span>
                            </div>

                            <div className="bg-red-50 p-4 text-center rounded-2xl border-2 border-red-200 flex flex-col justify-center">
                                <span className="text-red-400 text-[10px] font-bold uppercase mb-1">Préstamos Emitidos <Speaker text="Préstamos Emitidos"/></span>
                                <span className="text-red-700 text-2xl font-black">-${totalPrestamosGlobal.toFixed(2)}</span>
                            </div>
                        </div>

                        <h3 className="text-center font-bold text-gray-400 uppercase tracking-widest mb-4 text-sm">Estado de Miembros <Speaker text="Estado de Miembros"/></h3>
                        
                        <div className="space-y-4 max-h-[45vh] overflow-y-auto no-scrollbar pb-6 px-1">
                            {usuarios.filter(u => (!u.isEncargado || u.balance > 0 || u.deuda > 0)).length === 0 && (
                                <div className="text-center text-gray-400 py-10 font-bold">Nadie ha interactuado con el fondo 🫙 <Speaker text="Nadie ha interactuado con el fondo"/></div>
                            )}
                            {usuarios.filter(u => (!u.isEncargado || u.balance > 0 || u.deuda > 0)).map(u => (
                                <div key={u.avatar} className="bg-gray-50 p-4 rounded-2xl flex flex-col border-2 border-gray-200 shadow-sm relative overflow-hidden gap-3">
                                    
                                    <div className="flex justify-between items-center z-10 w-full border-b-2 border-gray-200 pb-2">
                                        <div className="flex items-center gap-3">
                                            <div className="text-5xl bg-white p-2 rounded-full shadow-sm relative">
                                                {u.avatar}
                                                {u.isEncargado && <span className="absolute -top-1 -right-1 text-xl bg-blue-100 p-1 rounded-full border border-white" title="Encargado">💼</span>}
                                            </div>
                                        </div>
                                        <div className="text-right">
                                            <p className="text-[10px] uppercase font-bold text-gray-400">Balance final <Speaker text="Balance final"/></p>
                                            <p className="text-3xl font-black text-gray-800">${u.balance.toFixed(2)}</p>
                                        </div>
                                    </div>
                                    
                                    <div className="flex justify-between items-end z-10 w-full text-xs font-bold uppercase tracking-wider px-2">
                                        <div className="flex flex-col gap-1 items-start">
                                            <span className="bg-blue-100 text-blue-700 px-2 py-0.5 rounded text-[10px]">Aporte: ${u.aportes.toFixed(2)} <Speaker text={`Aporte de ${u.aportes} dólares`} styleClass="ml-1"/></span>
                                            <span className="bg-green-100 text-green-700 px-2 py-0.5 rounded text-[10px]">+ Interés: ${u.interesGanado.toFixed(2)} <Speaker text={`Interés de ${u.interesGanado} dólares`} styleClass="ml-1"/></span>
                                        </div>
                                        {u.deuda > 0 ? (
                                            <div className="flex flex-col gap-1 items-end">
                                                <span className="bg-red-100 text-red-600 px-2 py-1 rounded text-[10px] shadow-sm animate-pulse border border-red-200">Deuda: -${u.deuda.toFixed(2)} <Speaker text={`Deuda de ${u.deuda} dólares`} styleClass="ml-1"/></span>
                                            </div>
                                        ) : (
                                            <span className="text-gray-300 text-[10px] pb-1">Sin Deudas ✅ <Speaker text="Sin Deudas" styleClass="ml-1"/></span>
                                        )}
                                    </div>

                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="container mx-auto max-w-lg relative bg-gray-100 min-h-screen">
                    
                    {/* OVERLAYS GLOBALES */}
                    {scannerConfig && (
                        <Scanner 
                            avatar={scannerConfig.targetAvatar}
                            isRegistration={scannerConfig.type === 'register'}
                            isEncargadoAuth={scannerConfig.type === 'encargado-verify'}
                            onSuccess={handleScannerSuccess} 
                            onCancel={() => setScannerConfig(null)} 
                        />
                    )}

                    {showSuccess && (
                        <div className="fixed inset-0 bg-green-500 z-50 flex flex-col items-center justify-center animate-pulse">
                            <div className="text-[180px] drop-shadow-2xl scale-150">👍</div>
                            <div className="text-white text-3xl font-bold mt-10 tracking-widest">GUARDADO</div>
                        </div>
                    )}

                    {view === 'menu' && renderMenu()}
                    {view === 'dashboard' && renderDashboard()}
                    {view === 'global' && renderGlobal()}
                </div>
            );
        }

        if (window.location.protocol === 'file:') {
            ReactDOM.render(
                <div className="min-h-screen bg-red-50 flex flex-col items-center justify-center p-6 text-center">
                    <div className="text-[120px] mb-6">⚠️</div>
                    <h1 className="text-4xl font-black text-red-800 mb-4">No abras el archivo con doble clic <Speaker text="No abras el archivo con doble clic"/></h1>
                    <p className="text-2xl text-red-700 font-medium max-w-lg mb-8">
                        Para que la base de datos y la inteligencia artificial funcionen de forma segura, debes acceder a través del servidor.
                    </p>
                    <div className="bg-white p-6 rounded-3xl shadow-xl border-4 border-red-200">
                        <p className="text-lg text-gray-500 font-bold uppercase mb-2">Escribe esto en la barra de tu navegador: <Speaker text="Escribe esto en la barra de tu navegador"/></p>
                        <p className="text-blue-600 text-5xl font-black">localhost:3000</p>
                    </div>
                </div>, 
                document.getElementById('root')
            );
        } else {
            ReactDOM.render(<App />, document.getElementById('root'));
        }
    </script>
</body>
</html>
